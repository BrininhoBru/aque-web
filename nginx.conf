# =============================================================================
# Aque — Nginx: serve o Angular via HTTPS e proxia /api para o backend
# =============================================================================

server {
    listen 80;
    server_name aque.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aque.local;

    ssl_certificate     /etc/nginx/certs/aque.crt;
    ssl_certificate_key /etc/nginx/certs/aque.key;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — redireciona todas as rotas para o index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para o backend Spring Boot
    location /api/ {
        proxy_pass http://aque-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
