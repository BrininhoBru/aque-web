<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <div
        style="width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.12); flex-shrink: 0;"
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
            fill="white"
            opacity="0.9"
          />
        </svg>
      </div>
      <span class="sidebar-brand">Aque</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <p class="sidebar-section-label">Principal</p>

    @for (item of mainNav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="nav-active" class="nav-link" (click)="onNavClick()">
        <span [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }

    <p class="sidebar-section-label" style="margin-top: 1rem;">Cadastros</p>

    @for (item of secondaryNav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="nav-active" class="nav-link" (click)="onNavClick()">
        <span [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">A</div>
      <span class="sidebar-username">admin</span>
    </div>
  </div>
</aside>
