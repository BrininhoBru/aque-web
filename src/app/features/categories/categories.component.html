<!-- Campo nome — troque form.get('name') por categoryForm -->
<input class="input" type="text" [formField]="categoryForm.name" placeholder="Ex: Academia" />
@if (categoryForm.name().touched() && categoryForm.name().invalid()) {
  <p class="text-xs mt-1" style="color: var(--color-danger)">
    {{ categoryForm.name().errors()[0]?.message }}
  </p>
}

<!-- Toggle de tipo — troque form.get('type')?.setValue() por setType() -->
@for (
  opt of [
    ['DESPESA', 'Despesa'],
    ['RECEITA', 'Receita'],
  ];
  track opt[0]
) {
  <button
    type="button"
    class="btn flex-1"
    [class]="categoryForm.type().value() === opt[0] ? 'btn-primary' : 'btn-ghost'"
    (click)="setType(opt[0])"
  >
    {{ opt[1] }}
  </button>
}

<!-- Botão salvar — troque form.invalid por !formValid() -->
<button type="submit" class="btn-primary flex-1" [disabled]="!formValid() || saving()">
  {{ saving() ? 'Salvando...' : 'Salvar' }}
</button>
