<button class="btn-nav" (click)="layout.toggle()" [title]="layout.sidebarOpen() ? 'Fechar menu' : 'Abrir menu'">
  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
  </svg>
</button>

<div class="header-month">
  <button class="btn-nav" (click)="monthYear.previousMonth()">‹</button>

  <span class="header-month-display">
    {{ monthYear.selected() | monthYear }}
  </span>

  <button class="btn-nav" (click)="monthYear.nextMonth()">›</button>
</div>

<button class="btn-nav" (click)="theme.toggle()" [title]="theme.dark() ? 'Modo claro' : 'Modo escuro'">
  @if (theme.dark()) {
    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12.3 4.9c.4-.2.6-.6.5-1-.1-.4-.5-.7-1-.6-4.7.5-8.3 4.5-8.3 9.2 0 5.1 4.2 9.3 9.3 9.3 4.7 0 8.7-3.6 9.2-8.3 0-.4-.2-.8-.6-1-.4-.1-.8.1-1 .5-1 2-3.1 3.3-5.5 3.3-3.4 0-6.2-2.8-6.2-6.2 0-2.4 1.3-4.5 3.3-5.5z" />
    </svg>
  } @else {
    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2v-2H2v2zm18 0h2v-2h-2v2zm-9-9h2V2h-2v2zm0 20h2v-2h-2v2zM4.93 5.64l1.41 1.41 1.06-1.06-1.41-1.41-1.06 1.06zm12.02 12.02l1.41 1.41 1.06-1.06-1.41-1.41-1.06 1.06zM19.07 5.64l-1.06-1.06-1.41 1.41 1.06 1.06 1.41-1.41zM6.34 17.66l-1.06-1.06-1.41 1.41 1.06 1.06 1.41-1.41z" />
    </svg>
  }
</button>

<button class="header-logout" (click)="auth.logout()">
  <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" />
  </svg>
  <span class="header-logout-text">Sair</span>
</button>
