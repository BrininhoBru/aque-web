<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="flex items-center gap-2">
      <div
        class="w-8 h-8 rounded-lg flex items-center justify-center"
        style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"
            fill="white"
            opacity="0.9"
          />
        </svg>
      </div>
      <span class="sidebar-brand">aque</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <p class="sidebar-section-label">Principal</p>

    @for (item of mainNav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="nav-active" class="nav-link">
        <span [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }

    <p class="sidebar-section-label" style="margin-top: 1rem;">Cadastros</p>

    @for (item of secondaryNav; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="nav-active" class="nav-link">
        <span [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">A</div>
      <span class="sidebar-username">admin</span>
    </div>
  </div>
</aside>
